<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Zone 🎮</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2 id="userEmail" style="padding-right: 20px;"></h2>
  <button onclick="logout()" style="margin-right: 20px;">Logout</button>

  <div class="container">
    <h1>🎮 Game Zone</h1>
  <p class="subtitle">Play Classic Web Games</p> 

    <div class="games">

      <div class="card">
        <h2>🐍 Snake Game</h2>
        <p>Classic snake game built with JavaScript</p>
        <button onclick="goSnake()">Play Now</button>
      </div>

      <div class="card">
        <h2>🔫 FPS Game</h2>
        <p>Old-style shooting game built with Python</p>
        <button onclick="goFPS()">Play Now</button>
      </div>

      <div class="card">
        <h2>🚗 Drive Mad</h2>
        <p>Physics car driving game</p>
        <button onclick="goDrive()">Play Now</button>
      </div>

    </div>
  </div>

<script type="module">
  import { auth } from "./app.js";

  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById("userEmail").innerText = "Hello, " + user.email;
    }
  });
</script>

  <script src="script.js"></script>

</body>
</html>
